            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Гарах
          </div>
        </div>
      </div>

      <div class="panel-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0b3d91" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
        Давхаргууд
      </div>

      <div class="layer-list">

        <!-- УДДТ-ийн барилга -->
        <div class="layer-row">
          <span class="no-expand"></span>
          <input type="checkbox" id="l-uddt" checked>
          <label for="l-uddt">УДДТ-ийн барилга</label>
        </div>

        <!-- ХҮТ-ийн хил хязгаар -->
        <div class="layer-row">
          <span class="no-expand"></span>
          <input type="checkbox" id="l-hut" checked>
          <label for="l-hut">ХҮТ-ийн хил хязгаар</label>
        </div>

        <div class="layer-divider"></div>

        <!-- Худаг (group) -->
        <div class="layer-row group-header" onclick="toggleGroup('g-hudag', this)">
          <span class="expand-btn open">▶</span>
          <input type="checkbox" id="l-hudag" checked onclick="event.stopPropagation()">
          <label for="l-hudag" onclick="event.stopPropagation()">Худаг</label>
        </div>
        <div class="sub-items open" id="g-hudag">
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-us-hudag" checked>
            <label for="l-us-hudag">Цэвэр усны худаг</label>
          </div>
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-dul-hudag" checked>
            <label for="l-dul-hudag">Дулааны худаг</label>
          </div>
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-ar-hudag" checked>
            <label for="l-ar-hudag">Ариутгах татуургын худаг</label>
          </div>
        </div>

        <div class="layer-divider"></div>

        <!-- Шугам (group) -->
        <div class="layer-row group-header" onclick="toggleGroup('g-shugam', this)">
          <span class="expand-btn open">▶</span>
          <input type="checkbox" id="l-shugam" checked onclick="event.stopPropagation()">
          <label for="l-shugam" onclick="event.stopPropagation()">Шугам</label>
        </div>
        <div class="sub-items open" id="g-shugam">
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-us-shugam" checked>
            <label for="l-us-shugam">Цэвэр усны шугам</label>
          </div>
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-dul-shugam" checked>
            <label for="l-dul-shugam">Дулааны шугам</label>
          </div>
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-ar-shugam" checked>
            <label for="l-ar-shugam">Ариутгах татуургын шугам</label>
          </div>
        </div>

        <div class="layer-divider"></div>

        <!-- Барилга (group) -->
        <div class="layer-row group-header" onclick="toggleGroup('g-barилга', this)">
          <span class="expand-btn open">▶</span>
          <input type="checkbox" id="l-barилга" checked onclick="event.stopPropagation()">
          <label for="l-barилга" onclick="event.stopPropagation()">Барилга</label>
        </div>
        <div class="sub-items open" id="g-barилга">
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-oros" checked>
            <label for="l-oros">Орон сууц</label>
          </div>
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-aminy" checked>
            <label for="l-aminy">Амины орон сууц</label>
          </div>
          <div class="layer-row sub-row">
            <span class="no-expand"></span>
            <input type="checkbox" id="l-aan" checked>
            <label for="l-aan">ААН</label>
          </div>
        </div>

      </div>

      <div class="basemap-section">
        <div class="panel-subheader">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
          Суурь газрын зураг
        </div>
        <select id="basemap-select">
          <option value="streets-navigation-vector" >Streets</option>
          <option value="satellite" selected>Satellite</option>
          <option value="hybrid">Hybrid</option>
          <option value="topo-vector">Topographic</option>
          <option value="gray-vector">Gray</option>
          <option value="dark-gray-vector">Dark Gray</option>
          <option value="osm">OpenStreetMap</option>
        </select>
      </div>

    </div>

    <div id="viewDiv">
      <div id="hover-panel">
        <div id="hp-header">
          <div id="hp-icon"></div>
          <div id="hp-title"></div>
          <div id="hp-close">×</div>
        </div>
        <div id="hp-body"></div>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profile-overlay">
    <div id="profile-modal">
      <div id="pm-header">
        <div id="pm-title">Миний мэдээлэл</div>
        <div id="pm-close">×</div>
      </div>
      <div id="pm-body">
        <div id="pm-photo-section">
          <div id="pm-photo-wrap">
            <img id="pm-photo-preview" src="" alt="">
            <div id="pm-photo-fallback">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#0b3d91" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <label id="pm-photo-btn" for="pm-photo-input">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
            </label>
            <input type="file" id="pm-photo-input" accept="image/*">
          </div>
          <div id="pm-photo-hint">Зураг солихын тулд дарна уу</div>
        </div>
        <div id="pm-fields">
          <div class="pm-name-grid">
            <div class="pm-field">
              <label class="pm-label">Овог</label>
              <input type="text" id="pm-last-name" class="pm-input" placeholder="Овог оруулна уу">
            </div>
            <div class="pm-field">
              <label class="pm-label">Нэр</label>
              <input type="text" id="pm-first-name" class="pm-input" placeholder="Нэр оруулна уу">
            </div>
          </div>
          <div class="pm-field">
            <label class="pm-label">Албан тушаал</label>
            <input type="text" id="pm-position" class="pm-input" placeholder="Албан тушаал оруулна уу">
          </div>
        </div>
      </div>
      <div id="pm-footer">
        <button id="pm-cancel">Цуцлах</button>
        <button id="pm-save">Хадгалах</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-overlay">
    <div id="edit-modal">
      <div id="em-header">
        <div id="em-title"></div>
        <div id="em-close">×</div>
      </div>
      <div id="em-body"></div>
      <div id="em-footer">
        <span id="em-status"></span>
        <div id="em-actions">
          <button id="em-cancel">Цуцлах</button>
          <button id="em-save">Хадгалах</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function toggleGroup(id, header) {
      const group = document.getElementById(id);
      const btn = header.querySelector('.expand-btn');
      group.classList.toggle('open');
      btn.classList.toggle('open');
    }
  </script>

  <script src="auth.js"></script>
</body>
</html>
